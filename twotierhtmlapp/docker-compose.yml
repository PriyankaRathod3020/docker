version: "3.8"
services:
  web:
    image: nginx:latest
    container_name: "nginx_container"
    ports: 
     - "8080:80"
    volumes:
     - ./html:/usr/share/nginx/html  #override the local html file in nginx containers html file. By using this the changes done in local will be reflected on the browser without building/ running the container again.   
    depends_on:
      - mysql

  mysql:
     image: mysql
     container_name: "mysql_container"
     ports:
       - "3306:3306"
     environment:
       - MYSQL_ROOT_PASSWORD=root    
     volumes:
       - mysql_data:/var/lib/mysql    

volumes:
  mysql_data:  
